name: Installation problem
description: Report download, Windows setup, macOS permission, launch, or setup problems.
title: "[Install]: "
labels: ["installation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing OysterWorkflow. Please redact personal data and do not share credentials or sensitive screenshots.
  - type: input
    id: version
    attributes:
      label: Release version
      description: "Example: v0.1.0"
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS Apple Silicon
        - macOS Intel
        - Windows x64
        - Not sure
    validations:
      required: true
  - type: input
    id: os_version
    attributes:
      label: Operating system version
      placeholder: macOS 15.x or Windows 11 23H2
  - type: checkboxes
    id: permissions
    attributes:
      label: Permissions involved
      options:
        - label: Screen Recording
        - label: Accessibility
        - label: Input Monitoring
        - label: Microphone
        - label: Not sure
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Include the exact step where you got stuck.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
