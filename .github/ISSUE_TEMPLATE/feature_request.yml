name: Feature request
description: Suggest a capability, workflow type, runtime integration, or product improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What repetitive work or agent capability gap should OysterWorkflow help with?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should the product do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Capture / recorder
        - Workflow discovery
        - Skill artifact generation
        - OpenClaw integration
        - Export / SDK / developer surface
        - Privacy / redaction
        - Installation / permissions
        - Other
  - type: textarea
    id: context
    attributes:
      label: Additional context

